<app-admin-navbar></app-admin-navbar>
<!-- Loading -->
<div *ngIf="loading" class="loading-box">
  Loading leave requests...
</div>

<!-- Error -->
<div *ngIf="!loading && error"
  class="w-[95%] m-5 p-3 rounded-lg bg-[#f6d3d0] text-[#fa3306] font-bold text-center border border-solid border-[#f0c7b9]">
  {{ error }}
</div>


<div *ngIf="!loading && !error">
  <div class="flex justify-center mt-[50px]">

    <div class="w-[520px] p-8 rounded-xl shadow-lg transition duration-300 hover:-translate-y-1" *ngIf="user">

      <div class="flex w-[60px] h-[60px] justify-center items-center rounded-full bg-blue-400 text-[white]">
        {{firstLetter}}
      </div>

      <h2 class="text-center text-gray-700 mb-6 font-semibold">ADMIN PROFILE</h2>

      <div class="grid grid-cols-2 gap-4">
        <div class="info">
          <span>ID</span>
          <strong>{{user.userId}}</strong>
        </div>

        <div class="info">
          <span>Name</span>
          <strong>{{user.userName}}</strong>
        </div>

        <div class="info">
          <span>Email</span>
          <strong>{{user.emailId}}</strong>
        </div>

      </div>

    </div>

  </div>
</div>

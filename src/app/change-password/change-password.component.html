<div class="w-[400px] mx-auto mt-20 p-8 bg-white rounded-2xl 
            shadow-[0_15px_40px_rgba(0,0,0,0.08)] 
            transition-all duration-300  
            hover:shadow-[0_20px_50px_rgba(0,0,0,0.12)]">
    <h2 class="text-center mb-5 text-gray-800">Change Password</h2>

    <form class="flex flex-col gap-[12px]" [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">

        <label class="form-label" for="emailId">Enter your Email ID</label>
        <input class="form-input" type="text" id="emailId" formControlName="emailId" readonly>

        <label class="form-label" for="oldPassword">Enter old password</label>
        <input class="form-input" type="password" id="oldPassword" formControlName="oldPassword" required>

        <label class="form-label" for="newPassword">Enter new password</label>
        <input class="form-input" type="password" id="newPassword" formControlName="newPassword" required>

        <button class="mt-2.5 p-2.5 rounded-xl bg-blue-400 text-white font-semibold 
         cursor-pointer transition duration-300 
         hover:bg-blue-500 hover:-translate-y-0.5" type="submit">Submit</button>
    </form>
</div>
